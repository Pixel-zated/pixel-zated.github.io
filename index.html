<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnitySMP - Under Construction</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    .logo {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }

    p {
      margin: 0;
      font-size: 16px;
      color: #888;
    }

    .discord-link {
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .discord-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background-color: #5865F2;
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 150px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .discord-button:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .discord-icon {
      width: 32px;
      height: 32px;
      margin-right: 12px;
      filter: invert(1);
    }

    .discord-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
      text-align: left;
    }

    .discord-small {
      font-size: 16px;
      opacity: 0.8;
    }

    .discord-large {
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="UnitySMP Logo" class="logo" />
    <h2>🚧 Under Construction 🚧</h2>

    <a href="https://www.discord.gg/THwThHjwGp" target="_blank" class="discord-link" rel="noopener noreferrer">
      <div class="discord-button">
        <img src="discord.svg" alt="Discord" class="discord-icon" />
        <div class="discord-text">
          <span class="discord-small">Join our</span>
          <span class="discord-large">Discord</span>
        </div>
      </div>
    </a>
  </div>
</body>
</html>
